<!DOCTYPE html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Rummikub – UI Sandbox</title>
    <!--
      Offline development harness. Renders the real board/rack/DnD using sample
      data WITHOUT Firebase, so the visuals and drag & drop can be verified in
      isolation. Not part of the deployed app.
    -->
    <link rel="stylesheet" href="../css/main.css" />
    <link rel="stylesheet" href="../css/tiles.css" />
    <link rel="stylesheet" href="../css/board.css" />
    <style>
      body { overflow: auto; }
      .sandbox { padding: 16px; }
      .sandbox h1 { font-size: 1.2rem; }
    </style>
  </head>
  <body>
    <div class="sandbox screen" id="game-screen">
      <h1>UI Sandbox — Drag &amp; Drop · Validierung</h1>
      <div class="board-area">
        <div class="board" id="board" data-dropzone="new-meld"></div>
      </div>
      <div class="rack-area">
        <div class="rack" id="rack" data-dropzone="rack"></div>
      </div>
    </div>

    <script type="module">
      import { createNumberTile, createJokerTile } from '../js/models/tile.js';
      import { COLORS } from '../js/game/constants.js';
      import { renderBoard } from '../js/ui/board-view.js';
      import { renderRack } from '../js/ui/rack-view.js';
      import { createDragController } from '../js/dnd/drag-drop.js';
      import {
        createWorkingTurn,
        applyDrop,
      } from '../js/models/working-turn.js';

      let id = 0;
      const n = (c, v) => createNumberTile(`t${id++}`, c, v);
      const j = () => createJokerTile(`j${id++}`);

      const board = [
        { id: 'm1', tiles: [n(COLORS.RED, 5), n(COLORS.RED, 6), n(COLORS.RED, 7)] },
        { id: 'm2', tiles: [n(COLORS.BLUE, 9), j(), n(COLORS.BLUE, 11)] },
        { id: 'm3', tiles: [n(COLORS.RED, 8), n(COLORS.BLUE, 8)] }, // intentionally invalid
      ];
      const hand = [
        n(COLORS.YELLOW, 1), n(COLORS.YELLOW, 2), n(COLORS.YELLOW, 3),
        n(COLORS.BLACK, 8), n(COLORS.BLACK, 10), n(COLORS.RED, 12), j(),
      ];

      let working = createWorkingTurn(board, hand);

      function render() {
        renderBoard(document.getElementById('board'), working.board, { locked: false });
        renderRack(document.getElementById('rack'), working.hand, { locked: false });
      }

      createDragController({
        root: document.getElementById('game-screen'),
        isEnabled: () => true,
        onDrop: (tileId, target) => {
          working = applyDrop(working, tileId, target);
          render();
        },
      });

      render();
    </script>
  </body>
</html>
